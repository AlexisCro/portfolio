<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Découvrez l'un des voyages photographique d'Alexis Crozier, photographe passionné, qui souhaite partager avec vous les étendues d'un pays magnifique: l'Islande." />
    <meta name="author" content="Alexis Crozier" />
    <title>Alexis Crozier - Photographe - Islande</title>
    <link rel="icon" type="image/x-icon" href="../../../assets/favicon.ico" />
    <link rel="stylesheet" href="../../../css/styles.css">
    <link rel="stylesheet" href="../../../css/photographie.css">
    <!-- Font Awesome icons -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="../../../js/renderContent.js"></script>
    <script type="module" src="../../../js/buildSectionCard.js" defer="false"></script>
  </head>
  <body class="iceland">
    <nav class="navbar navbar-expand-lg navbar-light fixed-top" id="mainNav">
      <div class="container px-4 px-lg-5">
        <div class='d-inline-block text-center w-100 my-1'>
          <a class="navbar-brand m-0 text-center" href="#page-top">Alexis Crozier - Portfolio</a>
        </div>
        <div class='d-flex justify-content-center align-items-center w-100'>
          <button class="navbar-toggler navbar-toggler-right" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            Menu
            <i class="fas fa-bars"></i>
          </button>
        </div>
        <div class="collapse navbar-collapse justify-content-center align-items-center" id="navbarResponsive">
          <ul class="navbar-nav d-flex align-items-center justify-content-center">
            <li class="nav-item text-center">
              <a href="../index.html" class="px-2 d-block">
                <img src="../../../assets/img/locale_logo/fr_flag.png" alt="fr" width="45px">
              </a>
            </li>
            <li class="nav-item text-center">
              <a href="../en/index.html" class="px-2 d-block">
                <img src="../../../assets/img/locale_logo/en_flag.png" alt="en" width="45px">
              </a>
            </li>
            <li class="nav-item text-center"><a class="nav-link text-nowrap" href="../../index.html">Portfolio developer</a></li>
            <li class="nav-item text-center"><a class="nav-link text-nowrap" href="#signup">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <header class="d-flex justify-content-center align-items-center flex-column">
      <h1>Iceland</h1>
      <h2>Land of fire and ice</h2>
      <h3 class="text-white-50 text-center">Welcome to a photographic journey to discover the power and beauty of Icelandic nature.</h3>
    </header>
    <section id="galery" class="d-flex justify-content-center align-items-center flex-wrap">
      <script type="module">
        import { libraryIceland } from '../../../js/buildSectionCard.js';
        import { displayCard } from '../../../js/buildSectionCard.js';
        displayCard('galery', libraryIceland);
      </script>
    </section>
    <!-- Signup-->
    <section class="signup-section w-100" id="signup">
      <div class="container px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5">
          <div class="col-md-10 col-lg-8 mx-auto text-center">
            <i class="far fa-paper-plane fa-2x mb-2 text-white"></i>
            <h2 class="text-white mb-5">Do you want to contact me ?</h2>
            <form action="https://formspree.io/f/mwkgblbb" method="post" id="form-contact">
              <div class='container'>
                <div class='row'>
                  <div class="btn-group my-2" role="group" aria-label="Basic radio toggle button group">
                    <input type="radio" class="btn-check" name="btnradio" value="Mr" id="btnradio1" autocomplete="off" checked>
                    <label class="btn btn-outline-primary text-white" for="btnradio1">Mr.</label>
                  
                    <input type="radio" class="btn-check" name="btnradio" value="Mme" id="btnradio2" autocomplete="off">
                    <label class="btn btn-outline-primary text-white" for="btnradio2">Mrs.</label>
                  
                    <input type="radio" class="btn-check" name="btnradio" value="Autre" id="btnradio3" autocomplete="off">
                    <label class="btn btn-outline-primary text-white" for="btnradio3">Other</label>
                  </div>
                </div>
                <div class='row my-2'>
                  <div class='col-lg-6 mb-2'>
                    <input name="firstName" class="form-control" id="firstName" type="text" placeholder="First Name" aria-label="First Name" data-sb-validations="required" />
                  </div>
                  <div class='col-lg-6 mb-2'>
                    <input name="lastName" class="form-control" id="lastName" type="text" placeholder="Last Name" aria-label="Last Name" data-sb-validations="required" />
                  </div>
                </div>
                <div class="row my-2">
                  <div class="col-md-12">
                    <input name="email" class="form-control" id="email" type="email" placeholder="Email" aria-label="Email" data-sb-validations="required,email" />
                  </div>
                </div>
                <div class='row my-2 px-2'>
                  <textarea name="message" class="form-control mt-3" id="message" type="text" placeholder="Your message..." aria-label="Your message..." data-sb-validations="required"></textarea>
                </div>
                <div class='row'>
                  <div class="col">
                    <button class="btn btn-primary" id="submitButton" type="submit">Contact me</button>
                  </div>
                  <div class="col">
                    <button class="btn btn-primary text-white" id="resetButton" type="reset">Reset form</button>
                  </div>  
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>        
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
