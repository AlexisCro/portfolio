    <head>
        <meta charset="utf-8" />

        <meta name="description" content="Alexis Crozier is a passionate web developer, discover his universe through this portfolio." />
        <meta name="author" content="Alexis Crozier" />
        <title>Alexis Crozier - Portfolio</title>
        <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- Font Awesome icons -->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet" />

        <link href="../css/styles.css" rel="stylesheet" />
        <link href="../css/media_query.css" rel="stylesheet" />
        <script src="../js/renderContent.js"></script>
    </head>
    <body id="page-top">
        <div id="navbar">
          <script>
            renderContent('navbar', 'navbar');
          </script>
        </div>

        <div id="header">
          <script>
            renderContent('header', 'header');
          </script>
        </div>
        <!-- About-->
        <div id="about">
          <script>
            renderContent('about', 'about');
          </script>
        </div>
        <!-- Skills -->
        <div id="skills">
          <script>
            renderContent('skills', 'skills');
          </script>
        </div>
        <!-- Projects-->
        <div id="projects">
          <script>
            renderContent('projects', 'projects');
          </script>
        </div>
        <!-- Signup-->
        <section class="signup-section" id="signup">
          <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5">
              <div class="col-md-10 col-lg-8 mx-auto text-center">
                <i class="far fa-paper-plane fa-2x mb-2 text-white"></i>
                <h2 class="text-white mb-5">Do you want to contact me ?</h2>
                <form action="https://formspree.io/f/mwkgblbb" method="post" id="form-contact">
                  <div class='container'>
                    <div class='row'>
                      <div class="btn-group my-2" role="group" aria-label="Basic radio toggle button group">
                        <input type="radio" class="btn-check" name="btnradio" value="Mr" id="btnradio1" autocomplete="off" checked>
                        <label class="btn btn-outline-primary text-white" for="btnradio1">Mr.</label>
                      
                        <input type="radio" class="btn-check" name="btnradio" value="Mme" id="btnradio2" autocomplete="off">
                        <label class="btn btn-outline-primary text-white" for="btnradio2">Mrs.</label>
                      
                        <input type="radio" class="btn-check" name="btnradio" value="Autre" id="btnradio3" autocomplete="off">
                        <label class="btn btn-outline-primary text-white" for="btnradio3">Other</label>
                      </div>
                    </div>
                    <div class='row my-2'>
                      <div class='col-lg-6 mb-2'>
                        <input name="firstName" class="form-control" id="firstName" type="text" placeholder="First Name" aria-label="First Name" data-sb-validations="required" />
                      </div>
                      <div class='col-lg-6 mb-2'>
                        <input name="lastName" class="form-control" id="lastName" type="text" placeholder="Last Name" aria-label="Last Name" data-sb-validations="required" />
                      </div>
                    </div>
                    <div class="row my-2">
                      <div class="col-md-12">
                        <input name="email" class="form-control" id="email" type="email" placeholder="Email" aria-label="Email" data-sb-validations="required,email" />
                      </div>
                    </div>
                    <div class='row my-2 px-2'>
                      <textarea name="message" class="form-control mt-3" id="message" type="text" placeholder="Your message..." aria-label="Your message..." data-sb-validations="required"></textarea>
                    </div>
                    <div class='row'>
                      <div class="col">
                        <button class="btn btn-primary" id="submitButton" type="submit">Contact me</button>
                      </div>
                      <div class="col">
                        <button class="btn btn-primary text-white" id="resetButton" type="reset">Reset form</button>
                      </div>  
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </section>        
        <!-- Contact-->
        <section class="contact-section bg-black">
          <div class="container px-4 px-lg-5">
            <div class="social d-flex justify-content-center">
              <a class="mx-2" href="https://github.com/AlexisCro" target="_blank"><i class="fab fa-github"></i></a>
              <a class="mx-2" href="https://www.linkedin.com/in/crozier-alexis-5b164b106/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            </div>
          </div>
        </section>
        <!-- Footer-->
        <footer class="footer bg-black small text-center text-white-50"><div class="container px-4 px-lg-5">Copyright &copy; Your Website 2023</div></footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="../js/scripts.js"></script>
        <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->

        <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
        <script src="../js/intersectionObservor.js"></script>
        <script src="../js/formValidation.js"></script>
    </body>
</html>
